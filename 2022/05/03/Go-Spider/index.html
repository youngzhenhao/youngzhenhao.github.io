ng</span> <span class="string">`json:&quot;title&quot;`</span></span><br><span class="line">	Director <span class="type">string</span> <span class="string">`json:&quot;director&quot;`</span></span><br><span class="line">	Picture  <span class="type">string</span> <span class="string">`json:&quot;picture&quot;`</span></span><br><span class="line">	Actor  	 <span class="type">string</span> <span class="string">`json:&quot;actor&quot;`</span></span><br><span class="line">	Year 	 <span class="type">string</span> <span class="string">`json:&quot;year&quot;`</span></span><br><span class="line">	Score 	 <span class="type">string</span> <span class="string">`json:&quot;score&quot;`</span></span><br><span class="line">	Quote 	 <span class="type">string</span> <span class="string">`json:&quot;quote&quot;`</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line"></span><br><span class="line">	InitDB()</span><br><span class="line"></span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="number">10</span>; i ++ &#123;</span><br><span class="line">		fmt.Printf(<span class="string">&quot;正在爬取第%d页\n&quot;</span>, i + <span class="number">1</span>)</span><br><span class="line">		Spider(strconv.Itoa(i * <span class="number">25</span>))</span><br><span class="line"></span><br><span class="line">		<span class="comment">// int 类型转换为string</span></span><br><span class="line">		<span class="comment">// Spider(fmt.Sprintf(&quot;%d&quot;, i * 25))</span></span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">Spider</span><span class="params">(page <span class="type">string</span>)</span></span> &#123;</span><br><span class="line">	<span class="comment">// 1. 发送请求</span></span><br><span class="line">	client := http.Client&#123;&#125;</span><br><span class="line">	<span class="comment">//request, err := http.NewRequest(&quot;GET&quot;, &quot;https://movie.douban.com/top250&quot;, nil)</span></span><br><span class="line">	request, err := http.NewRequest(<span class="string">&quot;GET&quot;</span>, <span class="string">&quot;https://movie.douban.com/top250?start=&quot;</span> + page + <span class="string">&quot;&amp;filter=&quot;</span>, <span class="literal">nil</span>)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span>&#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;request err&quot;</span>, err)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// 防止浏览器检测爬虫访问，所以加一些请求头伪造成浏览器访问</span></span><br><span class="line">	request.Header.Set(<span class="string">&quot;Connection&quot;</span>, <span class="string">&quot;keep-alive&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Cache-Control&quot;</span>, <span class="string">&quot;max-age=0&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;sec-ch-ua-mobile&quot;</span>, <span class="string">&quot;?0&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Upgrade-Insecure-Requests&quot;</span>, <span class="string">&quot;1&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;User-Agent&quot;</span>, <span class="string">&quot;Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/96.0.4664.110 Safari/537.36&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Accept&quot;</span>, <span class="string">&quot;text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Sec-Fetch-Site&quot;</span>, <span class="string">&quot;same-origin&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Sec-Fetch-Mode&quot;</span>, <span class="string">&quot;navigate&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Sec-Fetch-User&quot;</span>, <span class="string">&quot;?1&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Sec-Fetch-Dest&quot;</span>, <span class="string">&quot;document&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Referer&quot;</span>, <span class="string">&quot;https://movie.douban.com/chart&quot;</span>)</span><br><span class="line">	request.Header.Set(<span class="string">&quot;Accept-Language&quot;</span>, <span class="string">&quot;zh-CN,zh;q=0.9&quot;</span>)</span><br><span class="line"></span><br><span class="line">	response, err := client.Do(request)</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span>&#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;请求失败&quot;</span>, err)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">defer</span> response.Body.Close()</span><br><span class="line">	<span class="comment">// 2. 解析网页</span></span><br><span class="line">	docDetail, err := goquery.NewDocumentFromReader(response.Body)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span>&#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;解析失败&quot;</span>, err)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="com  class="line">			<span class="keyword">var</span> movieDatas MovieData</span><br><span class="line"></span><br><span class="line">			title := selection.Find(<span class="string">&quot;div &gt; div.article &gt; ol &gt; li:nth-child(1)&quot;</span>).Text()</span><br><span class="line">			img := selection.Find(<span class="string">&quot;div &gt; div.pic &gt; a &gt; img&quot;</span>) <span class="comment">// img标签 --&gt; src属性里面</span></span><br><span class="line">			imgTmp, ok := img.Attr(<span class="string">&quot;src&quot;</span>)</span><br><span class="line">			info := selection.Find(<span class="string">&quot;div &gt; div.info &gt; div.bd &gt; p:nth-child(1)&quot;</span>).Text()</span><br><span class="line">			score := selection.Find(<span class="string">&quot;div &gt; div.info &gt; div.bd &gt; div &gt; span.rating_num&quot;</span>).Text()</span><br><span class="line">			quote := selection.Find(<span class="string">&quot;div &gt; div.info &gt; div.bd &gt; p.quote &gt; span&quot;</span>).Text()</span><br><span class="line">			<span class="keyword">if</span> ok &#123;</span><br><span class="line"></span><br><span class="line">				<span class="comment">//fmt.Println(&quot;&quot;, title)</span></span><br><span class="line">				<span class="comment">//fmt.Println(&quot;imgTmp&quot;, imgTmp)</span></span><br><span class="line">				<span class="comment">////fmt.Println(&quot;info&quot;, info)</span></span><br><span class="line">				director, actor, year := InfoSplit(info)</span><br><span class="line">				<span class="comment">//fmt.Println(&quot;director&quot;, director)</span></span><br><span class="line">				<span class="comment">//fmt.Println(&quot;actor&quot;, actor)</span></span><br><span class="line">				<span class="comment">//fmt.Println(&quot;year&quot;, year)</span></span><br><span class="line">				<span class="comment">//</span></span><br><span class="line">				<span class="comment">//fmt.Println(&quot;score&quot;, score)</span></span><br><span class="line">				<span class="comment">//fmt.Println(&quot;quote&quot;, quote)</span></span><br><span class="line"></span><br><span class="line">				movieDatas.Title = title</span><br><span class="line">				movieDatas.Director = director</span><br><span class="line">				movieDatas.Picture = imgTmp</span><br><span class="line">				movieDatas.Actor = actor</span><br><span class="line">				movieDatas.Year = year</span><br><span class="line">				movieDatas.Score = score</span><br><span class="line">				movieDatas.Quote = quote</span><br><span class="line"></span><br><span class="line">				<span class="comment">// 4. 保存信息</span></span><br><span class="line"></span><br><span class="line">				<span class="keyword">if</span> InsertData(movieDatas) &#123;</span><br><span class="line">					<span class="comment">//fmt.Println(&quot;插入成功&quot;)</span></span><br><span class="line">				&#125;<span class="keyword">else</span> &#123;</span><br><span class="line">					fmt.Println(<span class="string">&quot;插入失败&quot;</span>)</span><br><span class="line">					<span class="keyword">return</span></span><br><span class="line">				&#125;</span><br><span class="line"></span><br><span class="line">				<span class="comment">//fmt.Println(movieDatas)</span></span><br><span class="line">			&#125;</span><br><span class="line">	&#125;)</span><br><span class="line">	fmt.Println(<span class="string">&quot;插入成功&quot;</span>)</span><br><span class="line">	<span class="keyword">return</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">InfoSplit</span><span class="params">(info <span class="type">string</span>)</span></span> (director, actor, year <span class="type">string</span>) &#123;</span><br><span class="line"></span><br><span class="line">	directorRegexp, _ := regexp.Compile(<span class="string">`(\d+)`</span>)</span><br><span class="line">	director = <span class="type">string</span>
