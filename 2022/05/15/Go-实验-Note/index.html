lass="line">	<span class="string">&quot;encoding/hex&quot;</span></span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;github.com/gin-gonic/gin&quot;</span></span><br><span class="line">	<span class="string">&quot;github.com/jinzhu/gorm&quot;</span></span><br><span class="line">	_ <span class="string">&quot;github.com/jinzhu/gorm/dialects/mysql&quot;</span></span><br><span class="line">	<span class="string">&quot;net/http&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> (</span><br><span class="line">	USERNAME = <span class="string">&quot;root&quot;</span></span><br><span class="line">	PASSWORD = <span class="string">&quot;123456&quot;</span></span><br><span class="line">	HOST     = <span class="string">&quot;127.0.0.1&quot;</span></span><br><span class="line">	PORT     = <span class="string">&quot;3306&quot;</span></span><br><span class="line">	DBNAME   = <span class="string">&quot;experiment&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="keyword">var</span> (</span><br><span class="line">	DB *gorm.DB</span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> UserLogin <span class="keyword">struct</span> &#123;</span><br><span class="line">	UserName <span class="type">string</span> <span class="string">`gorm:&quot;not null;&quot; json:&quot;username&quot; form:&quot;username&quot;`</span></span><br><span class="line">	PassWord <span class="type">string</span> <span class="string">`gorm:&quot;not null;&quot; json:&quot;password&quot; form:&quot;password&quot;`</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	<span class="comment">//创建数据库experiment</span></span><br><span class="line">	<span class="comment">//连接数据库experiment</span></span><br><span class="line">	errInit := InitMySQL()</span><br><span class="line">	<span class="keyword">if</span> errInit != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;err InitMySQL&quot;</span>, errInit)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">//程序退出关闭数据库连接</span></span><br><span class="line">	<span class="keyword">defer</span> DB.Close()</span><br><span class="line">	<span class="comment">//模型绑定</span></span><br><span class="line">	DB.AutoMigrate(&amp;UserLogin&#123;&#125;)</span><br><span class="line"></span><br><span class="line">	r := gin.Default()</span><br><span class="line"></span><br><span class="line">	r.LoadHTMLGlob(<span class="string">&quot;./templates/*&quot;</span>)</span><br><span class="line">	<span class="comment">//首页提供跳转注册和登录的按钮</span></span><br><span class="line">	r.GET(<span class="string">&quot;/&quot;</span>, <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line">		c.HTML(http.StatusOK, <span class="string">&quot;index.html&quot;</span>, <span class="literal">nil</span>)</span><br><span class="line">	&#125;)</span><br><span class="line"></span><br><span class="line">	<span class="comment">//用户的登陆注册功能</span></span><br><span class="line">	<span class="comment">//1、划分好不同的URL访问，如：login、Register，分别实现它们的Get和Post请求</span></span><br><span class="line">	<span class="comment">//2、注册的时候，先在数据库中查询，是否已经存在，存在则注册失败，转至重新注册的页面</span></span><br><span class="line">	<span class="comment">//注册成功则根据用户提交的UserName 和 PassWord插入到数据库中，转到登陆页面</span></span><br><span class="line">	<span class="comment">//3、登陆的时候，去数据库中查询，验证用户名是否存在，密码是否正确，用MD5加密，成功成功，转到主页</span></span><br><span class="line">	acGroup := r.Group(<span class="string">&quot;/account&quot;</span>)</span><br><span class="line">	&#123;</span><br><span class="line">		<span class="comment">//注册页面</span></span><br><span class="line">		acGroup.GET(<span class="string">&quot;/register&quot;</span>, <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line">			c.HTML(http.StatusOK, <span class="string">&quot;register.html&quot;</span>, <span class="literal">nil</span>)</span><br><span class="line">		&#125;)</span><br><span class="line">		<span class="comment">//提交注册信息</span></span><br><span class="line">		acGroup.POST(<span class="string">&quot;/register&quot;</span>, <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line">			<span class="comment">//1.请求中取出数据</span></span><br><span class="line">			<span class="keyword">var</span> regisInfo UserLogin</span><br><span class="line">			<span class="comment">//c.BindJSON(&amp;regisInfo)</span></span><br><span class="line">			regisInfo.UserName = c.PostForm(<span class="string">&quot;username&quot;</span>)</span><br><span class="line">			regisInfo.PassWord = c.PostForm(<span class="string">&quot;password&quot;</span>)</span><br><span class="line">			<span class="comment">//密码不为空，则md5加密</span></span><br><span class="line">			<span class="keyword">if</span> regisInfo.PassWord != <span class="string">&quot;&quot;</span> &#123;</span><br><span class="line">				regisInfo.PassWord = toMd5(regisInfo.PassWord)</span><br><span class="line">			&#125;</span><br><span class="line"></span><br><span class="line">			<span class="comment">//根据输入数据进行查询</span></span><br><span class="line">			<span class="keyword">var</span> searchInfo UserLogin</span><br><span class="line">			DB.Select(<span class="string">&quot;user_name&quot;</span>).Where(<span class="string">&quot;user_name = ?&quot;</span>, regisInfo.UserName).Find(&amp;searchInfo)</span><br><span class="line">			<span class="comment">//确保用户名密码不为空</span></span><br><span class="line">			<span class="keyword">if</span> regisInfo.UserName == <span class="string">&quot;&quot;</span> || regisInfo.PassWord == <span class="string">&quot;&quot;</span> &#123;</span><br><span class="line"></span><br><span class="line">				<span class="comment">//账号或密码为空，重新打开注册页面</span></span><br><span class="line">				<span class="comment">//返回JSON</span></span><br><span class="line">				<span class="comment">//c.JSON(http.StatusOK, gin.H&#123;&quot;code&quot;: &quot;666101&quot;, &quot;status&quot;: &quot;register fail&quot;, &quot;info&quot;: &quot;empty username or password&quot;&#125;)</span></span><br><span class="line"></span><br><span class="line">				c.Redirect(http.StatusMovedPermanently, <span class="string">&quot;/account/register&quot;</span>)</span><br><span class="line">				<span class="comment">//确保用户名不重复</span></span><br><span class="line">			&#125; <span class="keyword">else</span> <span class="keyword">if</span> searchInfo.UserName == regisInfo.UserName &#123;</span><br><span class="line"></span><br><span class="line">				<span class="comment">//用户名重复，重新打开注册页面</span></span><br><span class="line">				<span class="comment">//返回JSON</span></span><br><span class="line">				<span class="comment">//c.JSON(http.StatusOK, gin.H&#123;&quot;code&quot;: &quot;666102&quot;, &quot;status&quot;: &quot;register fail&quot;, &quot;info&quot;: &quot;username exist&quot;&#125;)</span></span><br><span class="line"></span><br><span class="line">				c.Redirect(http.StatusMovedPermanently, <span class="string">&quot;/account/register&quot;</span>)</span><br><span class="line">			&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">				<span class="comment">//2.存入数据库</span></span><br><span class="line">				<span class="keyword">if</span> errCr := DB.Create(&amp;regisInfo).Error; errCr != <span class="literal">nil</span> &#123;</span><br><span class="line">					c.JSON(http.StatusOK, gin.H&#123;<span class="string">&quot;error&quot;</span>: errCr.Error()&#125;)</span><br><span class="line">				&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">					<span class="comment">//3.返回结果</span></span><br><span class="line">					<span class="comment">//注册成功，转到登录页面</span></span><br><span class="line">					<span class="comment">//返回JSON</span></span><br><span class="line">					<span class="comment">//c.JSON(http.StatusOK, gin.H&#123;&quot;code&quot;: &quot;666001&quot;, &quot;status&quot;: &quot;register success&quot;, &quot;info&quot;: &quot;go to login&quot;&#125;)</span></span><br><span class="line"></span><br><span class="line">					<span class="comment">//c.String(http.StatusOK, &quot;success&quot;)</span></span><br><span class="line"></span><br><span class="line">					c.Redirect(http.StatusMovedPermanently, <span class="string">&quot;/account/login&quot;</span>)</span><br><span class="line">				&#125;</span><br><span class="line">			&#125;</span><br><span class="line"></span><br><span class="line">		&#125;)</span><br><span class="line">		<span class="comment">//登录页面</span></span><br><span class="line">		acGroup.GET(<span class="string">&quot;/login&quot;</span>, <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line">			c.HTML(http.StatusOK, <span class="string">&quot;login.html&quot;</span>, <span class="literal">nil</span>)</span><br><span class="line">		&#125;)</span><br><span class="line">		<span class="comment">//提交登录信息</span></span><br><span class="line">		acGroup.POST(<span class="string">&quot;/login&quot;</span>, <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line"></span><br><span class="line">			<span class="comment">//1.请求中取出数据</span></span><br><span class="line">			<span class="keyword">var</span> loginInfo UserLogin</span><br><span class="line">			<span class="comment">//c.BindJSON(&amp;regisInfo)</span></span><br><span class="line">			loginInfo.UserName = c.PostForm(<span class="string">&quot;username&quot;</span>)</span><br><span class="line">			loginInfo.PassWord = c.PostForm(<span class="string">&quot;password&quot;</span>)</span><br><span class="line">			<span class="comment">//密码不为空，则用md5加密</span></span><br><span class="line">			<span class="keyword">if</span> loginInfo.PassWord != <span class="string">&quot;&quot;</span> &#123;</span><br><span class="line">				loginInfo.PassWord = toMd5(loginInfo.PassWord)</span><br><span class="line">			&#125;</span><br><span class="line"></span><br><span class="line">			<span class="comment">//根据输入数据进行查询</span></span><br><span class="line">			<span class="keyword">var</span> searchInfo UserLogin</span><br><span class="line">			DB.Where(<span class="string">&quot;user_name = ?&quot;</span>, loginInfo.UserName).Find(&amp;searchInfo)</span><br><span class="line">			<span class="comment">//确保用户名密码不为空</span></span><br><span class="line">			<span class="keyword">if</span> loginInfo.UserName == <span class="string">&quot;&quot;</span> || loginInfo.PassWord == <span class="string">&quot;&quot;</span> &#123;</span><br><span class="line"></span><br><span class="line">				<span class="comment">//账号或密码为空，重新打开登录页面</span></span><br><span class="line">				<span class="comment">//返回JSON</span></span><br><span class="line">				<span class="comment">//c.JSON(http.StatusOK, gin.H&#123;&quot;code&quot;: &quot;666103&quot;, &quot;status&quot;: &quot;login fail&quot;, &quot;info&quot;: &quot;empty username or password&quot;&#125;)</span></span><br><span class="line"></span><br><span class="line">				c.Redirect(http.StatusMovedPermanently, <span class="string">&quot;/account/login&quot;</span>)</span><br><span class="line"></span><br><span class="line">				<span class="comment">//确保用户名密码正确</span></span><br><span class="line">			&#125; <span class="keyword">else</span> <span class="keyword">if</span> loginInfo.UserName != searchInfo.UserName || loginInfo.PassWord != searchInfo.PassWord &#123;</span><br><span class="line"></span><br><span class="line">				<span class="comment">//账号或密码错误，重新打开登录页面</span></span><br><span class="line">				<span class="comment">//返回JSON</span></span><br><span class="line">				<span class="comment">//c.JSON(http.StatusOK, gin.H&#123;&quot;code&quot;: &quot;666104&quot;, &quot;status&quot;: &quot;login fail&quot;, &quot;info&quot;: &quot;wrong username or password&quot;&#125;)</span></span><br><span class="line"></span><br><span class="line">				c.Redirect(http.StatusMovedPermanently, <span class="string">&quot;/account/login&quot;</span>)</span><br><span class="line">			&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">				<span class="comment">//登陆成功,跳转页面</span></span><br><span class="line">				<span class="comment">//设置cookie</span></span><br><span class="line"></span><br><span class="line">				_, errCoo := c.Cookie(<span class="string">&quot;log_cookie&quot;</span>)</span><br><span class="line"></span><br><span class="line">				<span class="keyword">if</span> errCoo != <span class="literal">nil</span> &#123;</span><br><span class="line">					<span class="comment">//暂时设置cookie为60秒，domain localhost 出错</span></span><br><span class="line">					c.SetCookie(<span class="string">&quot;log_cookie&quot;</span>, <span class="string">&quot;user_login&quot;</span>, <span class="number">600</span>, <span class="string">&quot;/&quot;</span>, <span class="string">&quot;localhost&quot;</span>, <span class="literal">false</span>, <span class="literal">true</span>)</span><br><span class="line">				&#125;</span><br><span class="line">				<span class="comment">//fmt.Printf(&quot;cookie Value: %s \n&quot;, cookie)</span></span><br><span class="line"></span><br><span class="line">				<span class="comment">//返回JSON</span></span><br><span class="line">				<span class="comment">//c.JSON(http.StatusOK, gin.H&#123;&quot;code&quot;: &quot;666002&quot;, &quot;status&quot;: &quot;login success&quot;, &quot;info&quot;: &quot;go to main page&quot;&#125;)</span></span><br><span class="line"></span><br><span class="line">				<span class="comment">//c.HTML(http.StatusOK, &quot;main.html&quot;, nil)</span></span><br><span class="line">				c.Redirect(http.StatusMovedPermanently, <span class="string">&quot;/main/index&quot;</span>)</span><br><span class="line"></span><br><span class="line">			&#125;</span><br><span class="line">		&#125;)</span><br><span class="line">		<span class="comment">//清理cookie重定向</span></span><br><span class="line">		acGroup.GET(<span class="string">&quot;/clear_cookie&quot;</span>, <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line"></span><br><span class="line">			c.SetCookie(<span class="string">&quot;log_cookie&quot;</span>, <span class="string">&quot;user_login&quot;</span>, <span class="number">-1</span>, <span class="string">&quot;/&quot;</span>, <span class="string">&quot;localhost&quot;</span>, <span class="literal">false</span>, <span class="literal">true</span>)</span><br><span class="line">			c.Redirect(http.StatusMovedPermanently, <span class="string">&quot;/account/login&quot;</span>)</span><br><span class="line">		&#125;)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">//1、每次访问AddArticle/DeleteArticle等等的时候，都应该验证用户的登陆状态，这些部分可以抽象出一个中间件</span></span><br><span class="line">	<span class="comment">//基础的认证校验：只要cookie中带了login_user标识就认为是登录用户</span></span><br><span class="line">	<span class="comment">//2、帖子的增删改查，全部用MYSQL实现</span></span><br><span class="line">	mainGroup := r.Group(<span class="string">&quot;/main&quot;</span>, StatCost())</span><br><span class="line">	&#123;</span><br><span class="line">		mainGroup.GET(<span class="string">&quot;/index&quot;</span>, <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line">			c.HTML(http.StatusOK, <span class="string">&quot;main.html&quot;</span>, <span class="literal">nil</span>)</span><br><span class="line">		&#125;)</span><br><span class="line"></span><br><span class="line">		artGroup := mainGroup.Group(<span class="string">&quot;/article&quot;</span>)</span><br><span class="line">		&#123;</span><br><span class="line">			<span class="comment">//查看</span></span><br><span class="line">			artGroup.GET(<span class="string">&quot;/index&quot;</span>, <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line">				<span class="comment">//通过输入的文章标题？id查找文章并展示</span></span><br><span class="line">			&#125;)</span><br><span class="line">			<span class="comment">//添加</span></span><br><span class="line">			<span class="comment">//删除</span></span><br><span class="line">			<span class="comment">//修改</span></span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">	<span class="comment">//r.GET(&quot;/clc&quot;, func(c *gin.Context) &#123;</span></span><br><span class="line">	<span class="comment">//	c.SetCookie(&quot;log_cookie&quot;, &quot;user_login&quot;, -1, &quot;/&quot;, &quot;&quot;, false, true)</span></span><br><span class="line">	<span class="comment">//&#125;)</span></span><br><span class="line"></span><br><span class="line">	r.Run(<span class="string">&quot;:9090&quot;</span>)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//中间件验证登录cookie</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">StatCost</span><span class="params">()</span></span> gin.HandlerFunc &#123;</span><br><span class="line">	<span class="keyword">return</span> <span class="function"><span class="keyword">func</span><span class="params">(c *gin.Context)</span></span> &#123;</span><br><span class="line">		_, errCoAu := c.Cookie(<span class="string">&quot;log_cookie&quot;</span>)</span><br><span class="line">		<span class="comment">//没有cookie</span></span><br><span class="line">		<span class="keyword">if</span> errCoAu != <span class="literal">nil</span> &#123;</span><br><span class="line">			<span class="comment">//c.JSON(http.StatusOK, gin.H&#123;&quot;code&quot;: &quot;6661045&quot;, &quot;status&quot;: &quot;access fail&quot;, &quot;info&quot;: &quot;Didn&#x27;t login&quot;&#125;)</span></span><br><span class="line"></span><br><span class="line">			c.Redirect(http.StatusMovedPermanently, <span class="string">&quot;/&quot;</span>)</span><br><span class="line"></span><br><span class="line">			c.Abort()</span><br><span class="line">		&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">			c.Next()</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">InitMySQL</span><span class="params">()</span></span> (err <span class="type">error</span>) &#123;</span><br><span class="line">	dsn := USERNAME + <span class="string">&quot;:&quot;</span> + PASSWORD + <span class="string">&quot;@tcp(&quot;</span> + HOST + <span class="string">&quot;:&quot;</span> + PORT + <span class="string">&quot;)/&quot;</span> + DBNAME + <span class="string">&quot;?charset=utf8mb4&quot;</span> + <span class="string">&quot;&amp;parseTime=True&quot;</span> + <span class="string">&quot;&amp;loc=Local&quot;</span></span><br><span class="line">	DB, err = gorm.Open(<span class="string">&quot;mysql&quot;</span>, dsn)</span><br><span class="line">	<span class="keyword">return</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">toMd5</span><span class="params">(str <span class="type">string</span>)</span></span> <span class="type">string</span> &#123;</span><br><span class="line">	h := md5.New()</span><br><span class="line">	h.Write([]<span class="type">byte</span>(str))</span><br><span class="line">	<span class="keyword">return</span> hex.EncodeToString(h.Sum(<span class="literal">nil</span>))</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>

  stellar = {

    loadCSS: (href, before, media, attributes) => {
      var doc = window.document;
      var ss = doc.createElement("link");
      var ref;
      if (before) {
        ref = before;
      } else {
        var refs = (doc.body || doc.getElementsByTagName("head")[0]).childNodes;
        ref = refs[refs.length - 1];
      }
      var sheets = doc.styleSheets;
      if (attributes) {
        for (var attributeName in attributes) {
          if (attributes.hasOwnProperty(attributeName)) {
            ss.setAttribute(attributeName, attributes[attributeName]);
          }
        }
      }
      ss.rel = "stylesheet";
      ss.href = href;
      ss.media = "only x";
      function ready(cb) {
        if (doc.body) {
          return cb();
        }
        setTimeout(function () {
          ready(cb);
        });
      }
      ready(function () {
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
      });
      var onloadcssdefined = function (cb) {
        var resolvedHref = ss.href;
        var i = sheets.length;
        while (i--) {
          if (sheets[i].href === resolvedHref) {
            return cb();
          }
        }
        setTimeout(function () {
          onloadcssdefined(cb);
        });
      };
      function loadCB() {
        if (ss.addEventListener) {
          ss.removeEventListener("load", loadCB);
        }
        ss.media = media || "all";
      }
      if (ss.addEventListener) {
        ss.addEventListener("load", loadCB);
      }
      ss.onloadcssdefined = onloadcssdefined;
      onloadcssdefined(loadCB);
      return ss;
    },

        }

        script.async = true
      }
      script.onerror = reject

        const loadState = this.readyState

      }
